<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avery's Children</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Open+Sans:wght@400;600&display=swap">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #0a1520;
      color: #b8c8d8;
      font-family: 'Open Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      overflow: hidden;
    }
    
    #back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      padding: 8px 16px;
      border: 1px solid #2a3a4a;
      background: #0a1015;
      color: #6a8a9a;
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 2px;
      text-decoration: none;
      transition: all 0.2s;
      z-index: 50;
    }
    
    #back-btn:hover { border-color: #4a6a7a; color: #8ab0c8; }
    
    h1 {
      font-family: 'Cinzel', serif;
      font-size: 20px;
      letter-spacing: 4px;
      margin-bottom: 10px;
    }
    
    .lucas-color { color: #4a9ad0; text-shadow: 0 0 15px rgba(74,154,208,0.4); }
    .sheriel-color { color: #8060a0; text-shadow: 0 0 15px rgba(128,96,160,0.4); }
    .afriel-color { color: #50a050; text-shadow: 0 0 15px rgba(80,160,80,0.4); }
    
    #level-display { color: #8ab0c8; font-family: 'Cinzel', serif; font-size: 12px; }
    
    canvas, #game-canvas { border: 2px solid #1a2535; }
    
    #char-select {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }
    
    .char-btn {
      padding: 8px 16px;
      border: 2px solid #2a3a4a;
      background: #0a1015;
      font-family: 'Cinzel', serif;
      font-size: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .char-btn:hover { border-color: #4a6a7a; }
    .char-btn.active { background: #0f1520; }
    .char-btn.lucas.active { border-color: #4a9ad0; }
    .char-btn.sheriel.active { border-color: #8060a0; }
    .char-btn.afriel.active { border-color: #50a050; }
    
    #controls-hint {
      margin-top: 8px;
      font-size: 11px;
      color: #4a6a7a;
    }
    
    #ability-hint {
      margin-top: 5px;
      font-size: 12px;
      color: #6a8a9a;
      font-style: italic;
      min-height: 20px;
    }
    
    #overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(10,21,32,0.97);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 15px;
      z-index: 100;
      padding: 40px;
    }
    
    #overlay.visible { display: flex; }
    
    #overlay h2, #overlay p, #overlay button, #overlay .char-card { font-family: 'Open Sans', sans-serif; }
    
    #overlay h2 {
      font-family: 'Cinzel', serif;
      font-size: 24px;
      letter-spacing: 5px;
      color: #4a9ad0;
    }
    
    #overlay .chars {
      display: flex;
      gap: 20px;
      margin: 15px 0;
    }
    
    #overlay .char-card {
      text-align: center;
      padding: 15px;
    }
    
    #overlay .char-name {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      margin: 5px 0;
    }
    
    #overlay .char-ability {
      font-size: 10px;
      color: #6a8a9a;
    }
    
    #overlay p {
      color: #6a8a9a;
      font-size: 13px;
      max-width: 500px;
      text-align: center;
      line-height: 1.7;
    }
    
    #overlay button {
      margin-top: 15px;
      padding: 10px 25px;
      border: 1px solid #4a9ad0;
      background: transparent;
      color: #8ab0c8;
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 2px;
      cursor: pointer;
    }
    
    #overlay button:hover { background: rgba(74,154,208,0.1); }
  </style>
</head>
<body>
  <a id="back-btn" href="../index.html">← GAMES</a>
  
  <h1 id="title">AVERY'S CHILDREN</h1>
  <div id="level-display">LEVEL 1</div>
  
  <canvas id="game-canvas" width="800" height="400"></canvas>
  
  <div id="char-select">
    <button class="char-btn lucas active" onclick="switchChar('lucas')">1 Lucas</button>
    <button class="char-btn sheriel" onclick="switchChar('sheriel')">2 Sheriel</button>
    <button class="char-btn afriel" onclick="switchChar('afriel')">3 Afriel</button>
  </div>
  
  <div id="controls-hint">A/D move · W jump · 1/2/3 switch · SPACE ability</div>
  
  <div id="overlay" style="display:none"></div>

  <script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    const W = canvas.width;
    const H = canvas.height;
    const GRAVITY = 0.4;
    const JUMP = -9;
    const SPEED = 3;
    
    const COLORS = { lucas: '#4a9ad0', sheriel: '#8060a0', afriel: '#50a050' };
    
    // Simple levels
    const LEVELS = [
      { // Level 1 - basics
        hint: "A/D to move, W to jump. Collect all gems!",
        platforms: [
          { x: 0, y: 350, w: 300, h: 50 },
          { x: 400, y: 350, w: 400, h: 50 },
        ],
        gems: [
          { x: 150, y: 320 },
          { x: 600, y: 320 },
        ],
        goal: { x: 750, y: 320 },
        water: [],
        walls: [],
        bridges: [],
      },
      { // Level 2 - Lucas freeze
        hint: "Lucas (1) + SPACE near water to freeze it!",
        platforms: [
          { x: 0, y: 350, w: 200, h: 50 },
          { x: 400, y: 350, w: 200, h: 50 },
          { x: 600, y: 350, w: 200, h: 50 },
        ],
        gems: [
          { x: 100, y: 320 },
          { x: 500, y: 320 },
          { x: 700, y: 320 },
        ],
        goal: { x: 750, y: 320 },
        water: [{ x: 200, y: 360, w: 200, h: 40 }],
        walls: [],
        bridges: [],
      },
      { // Level 3 - Sheriel bridge
        hint: "Sheriel (2) + SPACE to create a bridge!",
        platforms: [
          { x: 0, y: 350, w: 200, h: 50 },
          { x: 500, y: 350, w: 300, h: 50 },
        ],
        gems: [
          { x: 100, y: 320 },
          { x: 650, y: 320 },
        ],
        goal: { x: 750, y: 320 },
        water: [{ x: 200, y: 360, w: 300, h: 40 }],
        walls: [],
        bridges: [],
      },
      { // Level 4 - Afriel climb
        hint: "Afriel (3) + SPACE near wall to climb!",
        platforms: [
          { x: 0, y: 350, w: 300, h: 50 },
          { x: 500, y: 200, w: 150, h: 20 },
          { x: 650, y: 350, w: 150, h: 50 },
        ],
        gems: [
          { x: 150, y: 320 },
          { x: 550, y: 170 },
          { x: 700, y: 320 },
        ],
        goal: { x: 700, y: 170 },
        water: [],
        walls: [{ x: 400, y: 150, w: 30, h: 250 }],
        bridges: [],
      },
      { // Level 5 - all together
        hint: "Use all abilities to reach the top!",
        platforms: [
          { x: 0, y: 350, w: 200, h: 50 },
          { x: 400, y: 280, w: 150, h: 20 },
          { x: 650, y: 350, w: 150, h: 50 },
        ],
        gems: [
          { x: 100, y: 320 },
          { x: 450, y: 250 },
          { x: 700, y: 320 },
        ],
        goal: { x: 700, y: 250 },
        water: [{ x: 200, y: 360, w: 200, h: 40 }],
        walls: [{ x: 600, y: 200, w: 30, h: 200 }],
        bridges: [],
      },
      { // Level 6 - frozen bridge maze
        hint: "Freeze water, then build bridges!",
        platforms: [
          { x: 0, y: 350, w: 150, h: 50 },
          { x: 300, y: 350, w: 100, h: 50 },
          { x: 550, y: 350, w: 100, h: 50 },
          { x: 700, y: 300, w: 100, h: 50 },
        ],
        gems: [
          { x: 80, y: 320 },
          { x: 330, y: 320 },
          { x: 580, y: 320 },
        ],
        goal: { x: 740, y: 270 },
        water: [{ x: 150, y: 360, w: 150, h: 40 }, { x: 400, y: 360, w: 150, h: 40 }],
        walls: [],
        bridges: [],
      },
      { // Level 7 - vertical climb
        hint: "Climb walls to reach the top!",
        platforms: [
          { x: 0, y: 350, w: 200, h: 50 },
          { x: 150, y: 250, w: 100, h: 20 },
          { x: 300, y: 180, w: 100, h: 20 },
          { x: 450, y: 120, w: 150, h: 20 },
          { x: 650, y: 120, w: 150, h: 20 },
        ],
        gems: [
          { x: 50, y: 320 },
          { x: 180, y: 220 },
          { x: 330, y: 150 },
        ],
        goal: { x: 700, y: 90 },
        water: [],
        walls: [{ x: 100, y: 80, w: 25, h: 270 }, { x: 250, y: 80, w: 25, h: 150 }, { x: 400, y: 50, w: 25, h: 100 }],
        bridges: [],
      },
      { // Level 8 - triple threat
        hint: "Water, wall, gap - use everything!",
        platforms: [
          { x: 0, y: 350, w: 180, h: 50 },
          { x: 280, y: 300, w: 80, h: 20 },
          { x: 450, y: 250, w: 80, h: 20 },
          { x: 620, y: 200, w: 180, h: 50 },
        ],
        gems: [
          { x: 50, y: 320 },
          { x: 300, y: 270 },
          { x: 470, y: 220 },
        ],
        goal: { x: 700, y: 170 },
        water: [{ x: 180, y: 360, w: 100, h: 40 }],
        walls: [{ x: 530, y: 100, w: 25, h: 150 }],
        bridges: [],
      },
      { // Level 9 - the tower
        hint: "Climb the ancient tower!",
        platforms: [
          { x: 0, y: 350, w: 200, h: 50 },
          { x: 100, y: 270, w: 100, h: 20 },
          { x: 200, y: 200, w: 80, h: 20 },
          { x: 320, y: 140, w: 80, h: 20 },
          { x: 450, y: 100, w: 80, h: 20 },
          { x: 580, y: 60, w: 220, h: 20 },
        ],
        gems: [
          { x: 50, y: 320 },
          { x: 130, y: 240 },
          { x: 220, y: 170 },
          { x: 340, y: 110 },
        ],
        goal: { x: 650, y: 30 },
        water: [],
        walls: [{ x: 280, y: 60, w: 25, h: 100 }, { x: 400, y: 40, w: 25, h: 80 }, { x: 530, y: 20, w: 25, h: 60 }],
        bridges: [],
      },
      { // Level 10 - final challenge
        hint: "The ultimate test - all three together!",
        platforms: [
          { x: 0, y: 350, w: 150, h: 50 },
          { x: 220, y: 300, w: 100, h: 20 },
          { x: 380, y: 250, w: 80, h: 20 },
          { x: 520, y: 180, w: 80, h: 20 },
          { x: 660, y: 120, w: 140, h: 20 },
        ],
        gems: [
          { x: 50, y: 320 },
          { x: 250, y: 270 },
          { x: 400, y: 220 },
          { x: 540, y: 150 },
        ],
        goal: { x: 700, y: 90 },
        water: [{ x: 150, y: 360, w: 70, h: 40 }],
        walls: [{ x: 320, y: 80, w: 25, h: 180 }, { x: 460, y: 60, w: 25, h: 130 }],
        bridges: [],
      },
    ];
    
    let G = {
      started: false,
      level: 0,
      chars: {},
      active: 'lucas',
      platforms: [],
      gems: [],
      collected: new Set(),
      goal: null,
      water: [],
      walls: [],
      bridges: [],
      cooldowns: {},
    };
    
    const keys = {};
    document.addEventListener('keydown', e => {
      keys[e.key.toLowerCase()] = true;
      if (!G.started) return;
      if (e.key === '1') switchChar('lucas');
      if (e.key === '2') switchChar('sheriel');
      if (e.key === '3') switchChar('afriel');
      if (e.key === ' ') { e.preventDefault(); useAbility(); }
    });
    document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
    
    function switchChar(c) {
      G.active = c;
      document.querySelectorAll('.char-btn').forEach(b => b.classList.remove('active'));
      document.querySelector('.char-btn.' + c).classList.add('active');
      updateHint();
      document.getElementById('title').className = c + '-color';
    }
    
    function updateHint() {
      const hints = {
        lucas: 'SPACE near water to freeze',
        sheriel: 'SPACE to create bridge',
        afriel: 'SPACE near wall to climb'
      };
      const hintEl = document.getElementById('ability-hint');
      if (hintEl) hintEl.textContent = hints[G.active];
      document.getElementById('level-display').textContent = 'LEVEL ' + (G.level + 1) + ': ' + LEVELS[G.level].hint;
    }
    
    function startGame() {
      document.getElementById('overlay').style.display = 'none';
      G.started = true;
      loadLevel(0);
    }
    
    // Start game immediately
    startGame();
    
    function loadLevel(n) {
      G.level = n;
      const lvl = LEVELS[n];
      G.platforms = [...lvl.platforms];
      G.water = [...lvl.water];
      G.walls = [...lvl.walls];
      G.bridges = [];
      G.gems = lvl.gems.map((g, i) => ({ ...g, id: i, done: false }));
      G.collected = new Set();
      G.goal = { ...lvl.goal };
      G.cooldowns = {};
      
      G.chars = {
        lucas: { x: 50, y: 300, vx: 0, vy: 0, onGround: false, climbing: false, size: 18 },
        sheriel: { x: 80, y: 300, vx: 0, vy: 0, onGround: false, climbing: false, size: 16 },
        afriel: { x: 110, y: 300, vx: 0, vy: 0, onGround: false, climbing: false, size: 14 },
      };
      
      switchChar('lucas');
      updateHint();
    }
    
    function useAbility() {
      if (G.cooldowns[G.active]) return;
      const c = G.chars[G.active];
      
      if (G.active === 'lucas') {
        // Freeze water
        for (let i = G.water.length - 1; i >= 0; i--) {
          const w = G.water[i];
          if (c.x > w.x - 50 && c.x < w.x + w.w + 50) {
            G.platforms.push({ x: w.x, y: w.y, w: w.w, h: w.h, frozen: true });
            G.water.splice(i, 1);
            G.cooldowns[G.active] = true;
            setTimeout(() => G.cooldowns[G.active] = false, 500);
            return;
          }
        }
      } else if (G.active === 'sheriel') {
        // Create bridge
        const dir = c.vx >= 0 ? 1 : -1;
        G.bridges.push({
          x: c.x + dir * 30,
          y: c.y + 20,
          w: 100,
          h: 12
        });
        G.cooldowns[G.active] = true;
        setTimeout(() => G.cooldowns[G.active] = false, 500);
      } else if (G.active === 'afriel') {
        // Climb wall
        for (const wall of G.walls) {
          if (Math.abs(c.x - wall.x) < 40 && c.y > wall.y && c.y < wall.y + wall.h) {
            c.climbing = true;
            c.climbTarget = wall.y - 10;
            G.cooldowns[G.active] = true;
            setTimeout(() => G.cooldowns[G.active] = false, 300);
            return;
          }
        }
      }
    }
    
    function rectCollision(ax, ay, aw, ah, bx, by, bw, bh) {
      return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
    }
    
    function update() {
      if (!G.started) return;
      
      const ca = G.active;
      
      for (const [name, c] of Object.entries(G.chars)) {
        const isActive = name === ca;
        
        // Input
        if (isActive) {
          c.vx = 0;
          if (keys['a'] || keys['arrowleft']) c.vx = -SPEED;
          if (keys['d'] || keys['arrowright']) c.vx = SPEED;
          if ((keys['w'] || keys['arrowup']) && c.onGround) {
            c.vy = JUMP;
            c.onGround = false;
          }
        }
        
        // Climb
        if (c.climbing && isActive) {
          c.vy = 0;
          c.y -= 2;
          if (keys['w'] || keys['arrowup']) c.y -= 2;
          if (c.y <= c.climbTarget) {
            c.climbing = false;
            c.onGround = true;
          }
        }
        if (c.climbing && !isActive) c.climbing = false;
        if (c.climbing && !(keys['w'] || keys['arrowup'])) {
          c.climbing = false;
          c.vy = 1;
        }
        
        // Gravity
        if (!c.climbing) c.vy += GRAVITY;
        
        // Move X
        c.x += c.vx;
        
        // Collide walls X
        for (const wall of G.walls) {
          if (rectCollision(c.x - c.size, c.y - c.size, c.size * 2, c.size * 2, wall.x, wall.y, wall.w, wall.h)) {
            if (c.vx > 0) c.x = wall.x - c.size;
            else if (c.vx < 0) c.x = wall.x + wall.w + c.size;
          }
        }
        
        // Bounds X
        c.x = Math.max(c.size, Math.min(W - c.size, c.x));
        
        // Move Y
        c.y += c.vy;
        c.onGround = false;
        
        // Collide platforms
        const allPlats = [...G.platforms, ...G.bridges];
        for (const p of allPlats) {
          if (rectCollision(c.x - c.size, c.y - c.size, c.size * 2, c.size * 2, p.x, p.y, p.w, p.h)) {
            if (c.vy > 0) {
              c.y = p.y - c.size;
              c.vy = 0;
              c.onGround = true;
            } else if (c.vy < 0) {
              c.y = p.y + p.h + c.size;
              c.vy = 0;
            }
          }
        }
        
        // Collide walls Y
        for (const wall of G.walls) {
          if (rectCollision(c.x - c.size, c.y - c.size, c.size * 2, c.size * 2, wall.x, wall.y, wall.w, wall.h)) {
            if (c.vy > 0) {
              c.y = wall.y - c.size;
              c.vy = 0;
              c.onGround = true;
            } else if (c.vy < 0) {
              c.y = wall.y + wall.h + c.size;
              c.vy = 0;
            }
          }
        }
        
        // Fall in water
        for (const w of G.water) {
          if (rectCollision(c.x - c.size, c.y - c.size, c.size * 2, c.size * 2, w.x, w.y, w.w, w.h)) {
            c.y = 320;
            c.x = 50;
            c.vy = 0;
          }
        }
        
        // Bounds Y
        if (c.y > H + 50) {
          c.y = 320;
          c.x = 50;
          c.vy = 0;
        }
        
        // Collect gems
        for (const g of G.gems) {
          if (!g.done) {
            const dx = c.x - g.x;
            const dy = c.y - g.y;
            if (dx * dx + dy * dy < 900) {
              g.done = true;
              G.collected.add(g.id);
            }
          }
        }
        
        // Check goal
        if (G.collected.size === G.gems.length) {
          const dx = c.x - G.goal.x;
          const dy = c.y - G.goal.y;
          if (dx * dx + dy * dy < 900) {
            G.level++;
            if (G.level >= LEVELS.length) {
              const overlay = document.getElementById('overlay');
              overlay.style.display = 'flex';
              overlay.innerHTML = `
                <h2 style="color:#c0a030;font-family:Cinzel,serif;font-size:24px;letter-spacing:5px">ADVENTURE COMPLETE!</h2>
                <p style="color:#6a8a9a;font-size:13px;max-width:500px;text-align:center;line-height:1.7">The three siblings made it through the ruins. Together, as always.</p>
                <p style="color:#808080;font-style:italic">They are Avery's children, after all.</p>
                <button onclick="location.reload()">PLAY AGAIN</button>
              `;
              G.started = false;
            } else {
              loadLevel(G.level);
            }
          }
        }
      }
    }
    
    function render() {
      // Sky
      const sky = ctx.createLinearGradient(0, 0, 0, H);
      sky.addColorStop(0, '#0a1520');
      sky.addColorStop(1, '#1a2a3a');
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, W, H);
      
      // Stars
      ctx.fillStyle = '#fff';
      for (let i = 0; i < 30; i++) {
        ctx.globalAlpha = 0.3 + (i % 3) * 0.2;
        ctx.fillRect((i * 97) % W, (i * 53) % (H * 0.5), 1, 1);
      }
      ctx.globalAlpha = 1;
      
      // Platforms
      for (const p of G.platforms) {
        ctx.fillStyle = p.frozen ? '#4a9ad0' : '#2a3a4a';
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.fillStyle = p.frozen ? '#6ab0e0' : '#3a4a5a';
        ctx.fillRect(p.x, p.y, p.w, 5);
      }
      
      // Walls
      for (const w of G.walls) {
        ctx.fillStyle = '#4a5060';
        ctx.fillRect(w.x, w.y, w.w, w.h);
      }
      
      // Water
      for (const w of G.water) {
        ctx.fillStyle = '#2060a0';
        ctx.fillRect(w.x, w.y, w.w, w.h);
        ctx.fillStyle = '#3080c0';
        for (let i = 0; i < w.w; i += 15) {
          ctx.fillRect(w.x + i, w.y + Math.sin(Date.now() / 200 + i) * 3, 10, 3);
        }
      }
      
      // Bridges
      for (const b of G.bridges) {
        ctx.fillStyle = '#8060a0';
        ctx.fillRect(b.x, b.y, b.w, b.h);
      }
      
      // Gems
      for (const g of G.gems) {
        if (g.done) continue;
        ctx.save();
        ctx.translate(g.x, g.y);
        ctx.rotate(Date.now() / 500);
        ctx.fillStyle = '#c0a030';
        ctx.beginPath();
        ctx.moveTo(0, -8);
        ctx.lineTo(6, 0);
        ctx.lineTo(0, 8);
        ctx.lineTo(-6, 0);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }
      
      // Goal
      if (G.collected.size === G.gems.length) {
        ctx.fillStyle = '#50a050';
        ctx.beginPath();
        ctx.arc(G.goal.x, G.goal.y, 15, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowColor = '#50a050';
        ctx.shadowBlur = 15;
        ctx.fill();
        ctx.shadowBlur = 0;
      }
      
      // Characters
      for (const [name, c] of Object.entries(G.chars)) {
        const isActive = name === G.active;
        
        ctx.save();
        ctx.translate(c.x, c.y);
        
        // Glow
        if (isActive) {
          ctx.shadowColor = COLORS[name];
          ctx.shadowBlur = 12;
        }
        
        // Body
        ctx.fillStyle = COLORS[name];
        ctx.beginPath();
        ctx.arc(0, 0, c.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        
        // Eyes
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(-4, -3, 2.5, 0, Math.PI * 2);
        ctx.arc(4, -3, 2.5, 0, Math.PI * 2);
        ctx.fill();
        
        // Smile
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(0, 0, 4, 0.2, Math.PI - 0.2);
        ctx.stroke();
        
        ctx.restore();
      }
      
      // Gem count
      ctx.fillStyle = '#c0a030';
      ctx.font = '12px Cinzel, serif';
      ctx.fillText('GEMS: ' + G.collected.size + '/' + G.gems.length, 10, 25);
    }
    
    function loop(t) {
      update();
      render();
      requestAnimationFrame(loop);
    }
    
    loop(0);
  </script>
</body>
</html>
